title: Vidéo
kiosk_mode:
  admin_settings:
    hide_header: false
  user_settings:
    - users:
        - tablet
      hide_header: true
views:
  - path: default_view
    type: panel
    cards:
      - type: vertical-stack
        cards:
          - type: custom:mushroom-chips-card
            alignment: center
            chips:
              - type: action
                icon: mdi:home
                icon_color: blue
                tap_action:
                  action: navigate
                  navigation_path: /dashboard-playground
                hold_action:
                  action: navigate
                  navigation_path: /config/dashboards
              - type: action
                icon: mdi:shield-home
                icon_color: red
                tap_action:
                  action: navigate
                  navigation_path: /dashboard-alarme
              - type: action
                icon: mdi:doorbell-video
                icon_color: purple
                tap_action:
                  action: navigate
                  navigation_path: /lovelace-interphone
              - type: action
                icon: mdi:pool
                icon_color: cyan
                tap_action:
                  action: navigate
                  navigation_path: /dashboard-piscine
              - type: action
                icon: mdi:thermometer
                icon_color: green
                tap_action:
                  action: navigate
                  navigation_path: /lovelace-temperatures
              - type: action
                icon: mdi:cctv
                icon_color: teal
                tap_action:
                  action: navigate
                  navigation_path: /lovelace-video
            card_mod:
              style: |
                ha-card {
                  --chip-box-shadow: none;
                  --chip-background: rgba(var(--rgb-primary-text-color), 0.05);
                  margin-bottom: 4px;
                }
          - type: custom:layout-card
            layout_type: grid
            layout:
              grid-template-columns: repeat(2, 1fr)
              grid-auto-rows: calc(50vh - 28px)
              mediaquery:
                '(max-width: 768px)':
                  grid-template-columns: 1fr
                  grid-auto-rows: 50vh
            cards:
              - type: custom:advanced-camera-card
                cameras:
                  - camera_entity: camera.doorbell
                    live_provider: go2rtc
                    go2rtc:
                      stream: doorbell
                      modes:
                        - webrtc
                        - mse
                        - mp4
                        - mjpeg
                    frigate:
                      camera_name: doorbell
                view:
                  default: live
                status_bar:
                  style: none
              - type: custom:advanced-camera-card
                cameras:
                  - camera_entity: camera.entree
                    live_provider: go2rtc
                    go2rtc:
                      stream: entree
                      modes:
                        - webrtc
                        - mse
                        - mp4
                        - mjpeg
                    frigate:
                      camera_name: entree
                view:
                  default: live
                status_bar:
                  style: none
              - type: custom:advanced-camera-card
                cameras:
                  - camera_entity: camera.back
                    live_provider: go2rtc
                    go2rtc:
                      stream: back
                      modes:
                        - webrtc
                        - mse
                        - mp4
                        - mjpeg
                    frigate:
                      camera_name: back
                view:
                  default: live
                status_bar:
                  style: none
              - type: custom:advanced-camera-card
                cameras:
                  - camera_entity: camera.garage
                    live_provider: go2rtc
                    go2rtc:
                      stream: garage
                      modes:
                        - webrtc
                        - mse
                        - mp4
                        - mjpeg
                    frigate:
                      camera_name: garage
                view:
                  default: live
                status_bar:
                  style: none
                elements:
                  - type: icon
                    icon: mdi:arrow-left
                    tap_action:
                      action: perform-action
                      perform_action: button.press
                      target:
                        entity_id: button.ty2_garage_ptz_gauche
                    style:
                      top: 50%
                      left: 5%
                      transform: translateY(-50%)
                      color: white
                      opacity: 0.8
                  - type: icon
                    icon: mdi:arrow-right
                    tap_action:
                      action: perform-action
                      perform_action: button.press
                      target:
                        entity_id: button.ty2_garage_ptz_droite
                    style:
                      top: 50%
                      right: 5%
                      transform: translateY(-50%)
                      color: white
                      opacity: 0.8
                  - type: icon
                    icon: mdi:arrow-up
                    tap_action:
                      action: perform-action
                      perform_action: button.press
                      target:
                        entity_id: button.ty2_garage_ptz_haut
                    style:
                      top: 5%
                      left: 50%
                      transform: translateX(-50%)
                      color: white
                      opacity: 0.8
                  - type: icon
                    icon: mdi:arrow-down
                    tap_action:
                      action: perform-action
                      perform_action: button.press
                      target:
                        entity_id: button.ty2_garage_ptz_bas
                    style:
                      bottom: 5%
                      left: 50%
                      transform: translateX(-50%)
                      color: white
                      opacity: 0.8
