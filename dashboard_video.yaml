title: Vidéo
kiosk_mode:
  admin_settings:
    hide_header: false
  user_settings:
    - users:
        - tablet
      hide_header: true
views:
  - path: default_view
    type: panel
    cards:
      - type: vertical-stack
        cards:
          - type: custom:mushroom-chips-card
            alignment: center
            chips:
              - type: action
                icon: mdi:home
                icon_color: blue
                tap_action:
                  action: navigate
                  navigation_path: /dashboard-playground
                hold_action:
                  action: navigate
                  navigation_path: /config/dashboards
              - type: action
                icon: mdi:shield-home
                icon_color: red
                tap_action:
                  action: navigate
                  navigation_path: /dashboard-alarme
              - type: action
                icon: mdi:doorbell-video
                icon_color: purple
                tap_action:
                  action: navigate
                  navigation_path: /lovelace-interphone
              - type: action
                icon: mdi:pool
                icon_color: cyan
                tap_action:
                  action: navigate
                  navigation_path: /dashboard-piscine
              - type: action
                icon: mdi:thermometer
                icon_color: green
                tap_action:
                  action: navigate
                  navigation_path: /lovelace-temperatures
              - type: action
                icon: mdi:cctv
                icon_color: teal
                tap_action:
                  action: navigate
                  navigation_path: /lovelace-video
            card_mod:
              style: |
                ha-card {
                  --chip-box-shadow: none;
                  --chip-background: rgba(var(--rgb-primary-text-color), 0.05);
                  margin-bottom: 4px;
                }
          - type: custom:layout-card
            layout_type: grid
            layout:
              grid-template-columns: repeat(2, 1fr)
              grid-auto-rows: calc(50vh - 28px)
              mediaquery:
                '(max-width: 768px)':
                  grid-template-columns: 1fr
                  grid-auto-rows: 50vh
            cards:
              - type: custom:webrtc-camera
                url: camera.reolink_doorbell
                media: video, audio
                style: 'video {width: 100%; height: 100%; object-fit: contain; background: #000;}'
              - type: custom:webrtc-camera
                poster: snap.entree
                url: camera.entree
                media: video
                style: 'video {width: 100%; height: 100%; object-fit: contain; background: #000;}'
              - type: custom:webrtc-camera
                url: camera.back
                media: video
                style: 'video {width: 100%; height: 100%; object-fit: contain; background: #000;}'
              - type: custom:webrtc-camera
                url: camera.garage
                media: video, audio
                style: 'video {width: 100%; height: 100%; object-fit: contain; background: #000;}'
                ptz:
                  service: button.press
                  position: left
                  data_left:
                    entity_id: button.ty2_garage_ptz_gauche
                  data_right:
                    entity_id: button.ty2_garage_ptz_droite
                  data_up:
                    entity_id: button.ty2_garage_ptz_haut
                  data_down:
                    entity_id: button.ty2_garage_ptz_bas
