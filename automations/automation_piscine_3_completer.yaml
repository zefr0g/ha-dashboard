alias: "Piscine 3 — Compléter filtration en heure creuse"
description: "Démarre la pompe au début des heures creuses après le coucher du soleil si l'objectif de filtration n'est pas atteint."
trigger:
  - platform: state
    entity_id: binary_sensor.heure_creuse
    to: "on"
condition:
  - condition: sun
    after: sunset
  - condition: template
    value_template: >
      {% set temp = states('sensor.temperature_piscine') | float(0) %}
      {% set auj = states('sensor.piscine_filtration_auj') | float(0) %}
      {% set hier = states('sensor.piscine_filtration_hier') | float(0) %}
      {% set done = (hier + auj) if now().hour < 6 else auj %}
      {{ temp > 10 and done < (temp / 3) }}
  - condition: state
    entity_id: switch.piscine_relais
    state: "off"
action:
  - service: switch.turn_on
    target:
      entity_id: switch.piscine_relais
mode: single
