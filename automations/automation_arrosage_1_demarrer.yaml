alias: "Arrosage 1 — Démarrer sur surplus solaire"
description: >-
  Ouvre la vanne d'arrosage quand le surplus d'injection est supérieur à 500W
  depuis 10 min, qu'il ne pleut pas et qu'il n'est pas prévu de pluie.
  Ne s'active qu'une fois par jour (entre 9h et 17h).
trigger:
  - platform: numeric_state
    entity_id: sensor.msunpv_powreso
    below: -500
    for: "00:10:00"
condition:
  - condition: state
    entity_id: valve.valve_controller_valve
    state: closed
  - condition: time
    after: "09:00:00"
    before: "17:00:00"
  - condition: numeric_state
    entity_id: sensor.avignon_rain_chance
    below: 30
  - condition: numeric_state
    entity_id: sensor.avignon_daily_precipitation
    below: 5
  - condition: template
    value_template: >-
      {{ as_timestamp(now()) - as_timestamp(states.valve.valve_controller_valve.last_changed) > 43200 }}
action:
  - service: valve.open_valve
    target:
      entity_id: valve.valve_controller_valve
  - service: input_boolean.turn_on
    target:
      entity_id: input_boolean.arrosage_automatique
mode: single
