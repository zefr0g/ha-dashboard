alias: "Piscine — Redémarrer pompe quand soleil revient"
description: "Redémarre la pompe si production > 1000W stable 3 min et import < 100W."
trigger:
  - platform: numeric_state
    entity_id: sensor.current_power_production
    above: 1000
    for: "00:03:00"
condition:
  - condition: numeric_state
    entity_id: sensor.msunpv_powreso
    below: 100
  - condition: template
    value_template: >
      {% set temp = states('sensor.temperature_piscine') | float(0) %}
      {% set done = states('sensor.piscine_filtration_auj') | float(0) %}
      {{ temp > 10 and done < (temp / 2) }}
  - condition: template
    value_template: >
      {{ now() > as_datetime(state_attr('sun.sun', 'next_rising')) + timedelta(hours=3) }}
  - condition: sun
    before: sunset
  - condition: state
    entity_id: switch.piscine_relais
    state: "off"
action:
  - service: switch.turn_on
    target:
      entity_id: switch.piscine_relais
mode: single
