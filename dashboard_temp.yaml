kiosk_mode:
  admin_settings:
    hide_header: false
  user_settings:
    - users:
        - tablet
      hide_header: true
views:
  - title: Températures
    cards:
      - type: custom:mushroom-chips-card
        alignment: center
        chips:
          - type: action
            icon: mdi:home
            icon_color: blue
            tap_action:
              action: navigate
              navigation_path: /dashboard-playground
            hold_action:
              action: navigate
              navigation_path: /config/dashboards
          - type: action
            icon: mdi:shield-home
            icon_color: red
            tap_action:
              action: navigate
              navigation_path: /dashboard-alarme
          - type: action
            icon: mdi:doorbell-video
            icon_color: purple
            tap_action:
              action: navigate
              navigation_path: /lovelace-interphone
          - type: action
            icon: mdi:pool
            icon_color: cyan
            tap_action:
              action: navigate
              navigation_path: /dashboard-piscine
          - type: action
            icon: mdi:thermometer
            icon_color: green
            tap_action:
              action: navigate
              navigation_path: /lovelace-temperatures
          - type: action
            icon: mdi:cctv
            icon_color: teal
            tap_action:
              action: navigate
              navigation_path: /lovelace-video
        card_mod:
          style: |
            ha-card {
              --chip-box-shadow: none;
              --chip-background: rgba(var(--rgb-primary-text-color), 0.05);
              margin-bottom: 4px;
            }
      - type: horizontal-stack
        cards:
          - type: custom:stack-in-card
            mode: vertical
            cards:
              - type: custom:mini-graph-card
                name: Salon
                height: 80
                decimals: 1
                line_width: 2
                entities:
                  - entity: sensor.atc_0d03_temperature
                    name: Temp.
                    color: '#e45e33'
                  - entity: sensor.atc_0d03_humidity
                    name: Hyg.
                    color: '#1e5eee'
                    y_axis: secondary
                    show_state: true
                card_mod:
                  style: |
                    ha-card {
                      border: none !important;
                      box-shadow: none !important;
                    }
                    .states.flex::after {
                      content: "{{ relative_time(states['sensor.atc_0d03_temperature'].last_changed) }}";
                      white-space: pre;
                      font-size: 0.8em;
                      opacity: 0.7;
                    }
              - type: custom:mushroom-climate-card
                entity: climate.mitsusalon_mitsusalon
                name: Salon
                show_temperature_control: true
                hvac_modes:
                  - 'off'
                  - heat
                  - dry
                  - cool
                  - fan_only
                card_mod:
                  style: |
                    ha-card {
                      border: none !important;
                      box-shadow: none !important;
                    }
