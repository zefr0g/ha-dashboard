title: TDB
kiosk_mode:
  admin_settings:
    hide_header: false
  user_settings:
    - users:
        - tablet
      hide_header: true
      kiosk: true
views:
  - path: default_view
    title: Maison
    cards:
      - type: vertical-stack
        cards:
          - type: custom:mushroom-chips-card
            alignment: center
            chips:
              - type: action
                icon: mdi:home
                icon_color: blue
                tap_action:
                  action: navigate
                  navigation_path: /dashboard-playground
                hold_action:
                  action: navigate
                  navigation_path: /config/dashboards
              - type: action
                icon: mdi:shield-home
                icon_color: red
                tap_action:
                  action: navigate
                  navigation_path: /dashboard-alarme
              - type: action
                icon: mdi:doorbell-video
                icon_color: purple
                tap_action:
                  action: navigate
                  navigation_path: /lovelace-interphone
              - type: action
                icon: mdi:pool
                icon_color: cyan
                tap_action:
                  action: navigate
                  navigation_path: /dashboard-piscine
              - type: action
                icon: mdi:thermometer
                icon_color: green
                tap_action:
                  action: navigate
                  navigation_path: /lovelace-temperatures
              - type: action
                icon: mdi:cctv
                icon_color: teal
                tap_action:
                  action: navigate
                  navigation_path: /lovelace-video
            card_mod:
              style: |
                ha-card {
                  --chip-box-shadow: none;
                  --chip-background: rgba(var(--rgb-primary-text-color), 0.05);
                  margin-bottom: 4px;
                }
          - type: custom:stack-in-card
            mode: vertical
            cards:
              - type: custom:digital-clock
                timeFormat:
                  hour: 2-digit
                  minute: 2-digit
                  second: 2-digit
                  interval: 200
                card_mod:
                  style: |
                    ha-card {
                      border: none !important;
                      box-shadow: none !important;
                      margin-bottom: -12px;
                    }
              - type: weather-forecast
                entity: weather.forecast_maison
                show_forecast: true
                forecast_type: daily
                card_mod:
                  style: |
                    ha-card {
                      border: none !important;
                      box-shadow: none !important;
                      margin-bottom: -12px;
                    }
              - type: custom:mini-graph-card
                hours_to_show: 24
                height: 110
                line_width: 2
                lower_bound: -5
                upper_bound: 45
                lower_bound_secondary: 0
                upper_bound_secondary: 100
                show:
                  name: false
                  icon: false
                entities:
                  - entity: sensor.vevor_7in1_0_2569_temperature_2
                    name: Temp.
                    color: '#e45e33'
                    show_state: true
                    show_fill: true
                  - entity: sensor.vevor_7in1_0_2569_humidity_2
                    name: Humidité
                    color: '#42a5f5'
                    y_axis: secondary
                    show_state: true
                    show_fill: false
                card_mod:
                  style: |
                    ha-card {
                      border: none !important;
                      box-shadow: none !important;
                    }
                    .states.flex {
                      flex-wrap: wrap;
                    }
                    .states.flex::after {
                      content: "{{ relative_time(states['sensor.vevor_7in1_0_2569_temperature_2'].last_changed) }}";
                      flex-basis: 100%;
                      font-size: 0.8em;
                      opacity: 0.7;
                      text-align: center;
                      margin-top: 2px;
                    }
              - type: horizontal-stack
                cards:
                  - type: custom:mushroom-template-card
                    primary: >-
                      {{ states('sensor.vevor_7in1_0_2569_wind_average') | float | round(1) }} km/h
                    secondary: >-
                      {% set d = states('sensor.vevor_7in1_0_2569_wind_direction_2') | float %}
                      {% set dirs = ['N','NE','E','SE','S','SO','O','NO'] %}
                      {{ dirs[((d + 22.5) / 45) | int % 8] }} ({{ d | round(0) | int }}°)
                    icon: mdi:weather-windy
                    icon_color: >-
                      {% set v = states('sensor.vevor_7in1_0_2569_wind_average') | float %}
                      {% if v < 20 %} teal
                      {% elif v < 40 %} green
                      {% elif v < 60 %} orange
                      {% else %} red
                      {% endif %}
                    entity: sensor.vevor_7in1_0_2569_wind_average
                    tap_action:
                      action: more-info
                    card_mod:
                      style: |
                        ha-card {
                          border: none !important;
                          box-shadow: none !important;
                        }
                  - type: custom:mushroom-template-card
                    primary: >-
                      {{ states('sensor.vevor_7in1_0_2569_wind_max') | float | round(1) }} km/h
                    secondary: >-
                      {% set g = states('sensor.vevor_7in1_0_2569_wind_max') | float %}
                      {% if g < 20 %} Calme
                      {% elif g < 40 %} Brise
                      {% elif g < 60 %} Vent fort
                      {% elif g < 90 %} Mistral
                      {% else %} Mistral violent
                      {% endif %}
                    icon: mdi:windsock
                    icon_color: >-
                      {% set g = states('sensor.vevor_7in1_0_2569_wind_max') | float %}
                      {% if g < 20 %} teal
                      {% elif g < 40 %} green
                      {% elif g < 60 %} orange
                      {% elif g < 90 %} deep-orange
                      {% else %} red
                      {% endif %}
                    entity: sensor.vevor_7in1_0_2569_wind_max
                    tap_action:
                      action: more-info
                    card_mod:
                      style: |
                        ha-card {
                          border: none !important;
                          box-shadow: none !important;
                        }
              - type: custom:mushroom-chips-card
                alignment: center
                chips:
                  - type: template
                    entity: sensor.vevor_7in1_0_2569_uv_index
                    icon: mdi:sun-wireless
                    icon_color: orange
                    content: "UV {{ states('sensor.vevor_7in1_0_2569_uv_index') }}"
                    tap_action:
                      action: more-info
                  - type: template
                    entity: sensor.vevor_7in1_0_2569_rain
                    icon: mdi:weather-rainy
                    icon_color: blue
                    content: "{{ states('sensor.vevor_7in1_0_2569_rain') }} mm"
                    tap_action:
                      action: more-info
                  - type: template
                    entity: sensor.vevor_7in1_0_2569_illuminance
                    icon: mdi:brightness-5
                    icon_color: yellow
                    content: "{{ states('sensor.vevor_7in1_0_2569_illuminance') }} lx"
                    tap_action:
                      action: more-info
                card_mod:
                  style: |
                    ha-card {
                      border: none !important;
                      box-shadow: none !important;
                      --chip-background: rgba(var(--rgb-primary-text-color), 0.05);
                    }
          - type: horizontal-stack
            cards:
              - type: custom:stack-in-card
                mode: vertical
                cards:
                  - type: custom:mini-graph-card
                    points_per_hour: 2
                    hours_to_show: 48
                    name: T° ECS
                    height: 60
                    line_width: 2
                    font_size: 70
                    entities:
                      - sensor.ballon_temperature
                    show:
                      labels: true
                    color_thresholds:
                      - value: 25
                        color: '#245fd7'
                      - value: 35
                        color: '#d78824'
                      - value: 45
                        color: '#d75024'
                      - value: 50
                        color: red
                  - type: custom:mushroom-chips-card
                    alignment: center
                    chips:
                      - type: template
                        entity: switch.manubal
                        icon: |-
                          {% if is_state('switch.manubal', 'on') %}
                            mdi:water-boiler-alert
                          {% else %}
                            mdi:water-boiler
                          {% endif %}
                        icon_color: |-
                          {% if is_state('switch.manubal', 'on') %}
                            red
                          {% else %}
                            grey
                          {% endif %}
                        content: >-
                          Manubal {% if is_state('switch.manubal', 'on') %}ON{%
                          else %}OFF{% endif %}
                        tap_action:
                          action: toggle
                    card_mod:
                      style: |
                        ha-card {
                          --chip-spacing: 0;
                          padding: 0 4px 4px 4px !important;
                        }
              - type: custom:stack-in-card
                mode: vertical
                cards:
                  - type: custom:mini-graph-card
                    name: T° Piscine
                    hours_to_show: 48
                    height: 60
                    line_width: 2
                    font_size: 70
                    entities:
                      - sensor.temperature_piscine
                    color_thresholds:
                      - value: 15
                        color: '#245fd7'
                      - value: 20
                        color: '#0cb9c1'
                      - value: 24
                        color: '#3aaa00'
                      - value: 28
                        color: '#f5b514'
                      - value: 32
                        color: '#d75024'
                    card_mod:
                      style: |
                        .states.flex::after {
                          content: "{{ relative_time(states['sensor.temperature_piscine'].last_changed) }}";
                          font-size: 0.75em;
                          opacity: 0.7;
                        }
                  - type: custom:mushroom-chips-card
                    alignment: center
                    chips:
                      - type: template
                        entity: switch.piscine_relais
                        icon: |-
                          {% if is_state('switch.piscine_relais', 'on') %}
                            mdi:pump
                          {% else %}
                            mdi:pump-off
                          {% endif %}
                        icon_color: |-
                          {% if is_state('switch.piscine_relais', 'on') %}
                            red
                          {% else %}
                            grey
                          {% endif %}
                        content: >-
                          Pompe {% if is_state('switch.piscine_relais', 'on')
                          %}ON{% else %}OFF{% endif %}
                        tap_action:
                          action: toggle
                    card_mod:
                      style: |
                        ha-card {
                          --chip-spacing: 0;
                          padding: 0 4px 4px 4px !important;
                        }
              - type: custom:stack-in-card
                mode: vertical
                cards:
                  - type: custom:mini-graph-card
                    name: Baromètre
                    hours_to_show: 24
                    height: 60
                    bar_spacing: 3
                    line_width: 2
                    points_per_hour: 1
                    font_size: 70
                    line_color: '#7e69f9'
                    entities:
                      - entity: sensor.garage_pressure
                        name: Baromètre
                        show_state: true
                    show:
                      graph: bar
                      labels: false
                    card_mod:
                      style: |
                        .graph { margin-top: 0 !important; padding-top: 0 !important; }
                        .graph__container { margin-top: 0 !important; }
                  - type: custom:mushroom-chips-card
                    alignment: center
                    chips:
                      - type: template
                        entity: sensor.garage_pressure
                        icon: >-
                          {% set p = states('sensor.garage_pressure') | float(0) %}
                          {% if p > 1020 %} mdi:weather-sunny
                          {% elif p > 1009 %} mdi:weather-partly-cloudy
                          {% else %} mdi:weather-rainy
                          {% endif %}
                        icon_color: >-
                          {% set p = states('sensor.garage_pressure') | float(0) %}
                          {% if p > 1020 %} amber
                          {% elif p > 1009 %} orange
                          {% else %} blue
                          {% endif %}
                        content: >-
                          {% set p = states('sensor.garage_pressure') | float(0) %}
                          {% if p > 1020 %} Soleil
                          {% elif p > 1009 %} Variable
                          {% else %} Pluie
                          {% endif %}
                        tap_action:
                          action: more-info
                    card_mod:
                      style: |
                        ha-card {
                          --chip-spacing: 0;
                          padding: 0 4px 4px 4px !important;
                        }
          - type: custom:mushroom-chips-card
            alignment: center
            chips:
              - type: template
                entity: sensor.particulate_matter_2_5mm_concentration
                icon: mdi:blur
                icon_color: >-
                  {% set pm = states('sensor.particulate_matter_2_5mm_concentration') | float(0) %}
                  {% if pm < 10 %} green
                  {% elif pm < 20 %} light-green
                  {% elif pm < 30 %} orange
                  {% elif pm < 50 %} deep-orange
                  {% else %} red
                  {% endif %}
                content: >-
                  PM2.5 {{ states('sensor.particulate_matter_2_5mm_concentration') | float(0) | round(1) }} µg/m³ —
                  {% set pm = states('sensor.particulate_matter_2_5mm_concentration') | float(0) %}
                  {% if pm < 10 %} Bon
                  {% elif pm < 20 %} Correct
                  {% elif pm < 30 %} Modéré
                  {% elif pm < 50 %} Dégradé
                  {% else %} Mauvais
                  {% endif %}
                tap_action:
                  action: more-info
            card_mod:
              style: |
                ha-card {
                  --chip-background: rgba(var(--rgb-primary-text-color), 0.05);
                  padding: 0 4px 4px 4px !important;
                }
      - type: vertical-stack
        cards:
          - type: custom:mushroom-chips-card
            alignment: center
            chips:
              - type: template
                entity: binary_sensor.lxc_dd_frigate_106_status
                icon: mdi:cctv
                icon_color: >-
                  {% if is_state('binary_sensor.lxc_dd_frigate_106_status',
                  'on') %}green {% else %}red{% endif %}
                content: >-
                  {{ states('sensor.lxc_dd_frigate_106_cpu_used') | float |
                  round(0) }}%
                tap_action:
                  action: more-info
              - type: template
                entity: binary_sensor.qemu_dd_haos_103_status
                icon: mdi:home-assistant
                icon_color: >-
                  {% if is_state('binary_sensor.qemu_dd_haos_103_status', 'on')
                  %}green {% else %}red{% endif %}
                content: >-
                  {{ states('sensor.qemu_dd_haos_103_cpu_used') | float |
                  round(0) }}%
                tap_action:
                  action: more-info
              - type: template
                entity: binary_sensor.qemu_dd_storage_102_status
                icon: mdi:nas
                icon_color: >-
                  {% if is_state('binary_sensor.qemu_dd_storage_102_status',
                  'on') %}green {% else %}red{% endif %}
                content: >-
                  {{ states('sensor.qemu_dd_storage_102_cpu_used') | float |
                  round(0) }}%
                tap_action:
                  action: more-info
              - type: template
                entity: binary_sensor.node_prox_status
                icon: mdi:server
                icon_color: >-
                  {% if is_state('binary_sensor.node_prox_status', 'on') %}green
                  {% else %}red{% endif %}
                content: '{{ states(''sensor.node_prox_cpu_used'') | float | round(0) }}%'
                tap_action:
                  action: more-info
            card_mod:
              style: |
                ha-card {
                  margin-bottom: 4px;
                }
          - type: custom:stack-in-card
            mode: vertical
            card_mod:
              style: |
                ha-card {
                  border: none !important;
                  box-shadow: none !important;
                  --mush-spacing: 6px;
                }
            cards:
              - type: custom:mini-graph-card
                name: Energie
                decimals: 0
                points_per_hour: 2
                line_width: 2
                height: 80
                entities:
                  - entity: sensor.msunpv_powreso
                    color: '#0867ec'
                    name: MSunPV
                  - entity: sensor.teleinfo_puissance_apparente
                    color: '#17b897'
                    name: Téléinfo
                  - entity: sensor.current_power_production
                    show_state: true
                    color: '#f5b514'
                    name: Production
                card_mod:
                  style: |
                    ha-card {
                      border: none !important;
                      box-shadow: none !important;
                    }
              - type: horizontal-stack
                cards:
                  - type: custom:mushroom-template-card
                    icon: mdi:transmission-tower
                    badge_icon: mdi:swap-horizontal
                    badge_color: purple
                    icon_color: blue
                    primary: >-
                      → {{ (states('sensor.msunpv_enconso') | float / 1000) |
                      round(2) }} kWh
                    secondary: >-
                      ← {{ (states('sensor.msunpv_eninj') | float / 1000) |
                      round(2) | abs }} kWh
                    tap_action:
                      action: more-info
                      entity: sensor.msunpv_enconso
                    card_mod:
                      style: |
                        ha-card {
                          border: none !important;
                          box-shadow: none !important;
                          --spacing: 6px;
                        }
                  - type: custom:mushroom-template-card
                    icon: mdi:solar-power
                    icon_color: yellow
                    primary: '{{ states(''sensor.today_power_production'') }} kWh'
                    secondary: >-
                      {{
                      states('sensor.envoy_122152048399_today_s_energy_production')
                      | round(2) }} kWh + {{ states('sensor.prod_apsys') |
                      round(2) }} kWh
                    entity: sensor.today_power_production
                    tap_action:
                      action: more-info
                    card_mod:
                      style: |
                        ha-card {
                          border: none !important;
                          box-shadow: none !important;
                          --spacing: 6px;
                        }
              - type: horizontal-stack
                cards:
                  - type: custom:mushroom-template-card
                    icon: mdi:solar-power-variant
                    icon_color: blue
                    primary: >
                      auj. {{ (states('sensor.energy_production_today') | float
                      +
                       states('sensor.energy_production_today_2') | float) | round(2) }} kWh
                    secondary: >
                      dem. {{ (states('sensor.energy_production_tomorrow') |
                      float + states('sensor.energy_production_tomorrow_2') |
                      float) | round(2) }} kWh
                    tap_action:
                      action: more-info
                      entity: sensor.energy_production_today
                    card_mod:
                      style: |
                        ha-card {
                          border: none !important;
                          box-shadow: none !important;
                          --spacing: 6px;
                        }
                  - type: custom:mushroom-template-card
                    icon: mdi:solar-power-variant
                    icon_color: yellow
                    primary: >
                      E {{
                      (states('sensor.envoy_122152048399_current_power_production')
                      | float) | round(2) }} W
                    secondary: >
                      AP {{ (states('sensor.solar_total_power') | float) |
                      round(2) }} W
                    tap_action:
                      action: more-info
                      entity: sensor.solar_total_power
                    card_mod:
                      style: |
                        ha-card {
                          border: none !important;
                          box-shadow: none !important;
                          --spacing: 6px;
                        }
              - type: custom:mushroom-template-card
                entity: sensor.teleinfo_libelle_tarif_en_cours
                primary: >-
                  {% if is_state('binary_sensor.heure_creuse', 'on') %}Heure Creuse{% else %}Heure Pleine{% endif %}
                secondary: >-
                  HC: {{ (states('sensor.teleinfo_index_tarif_1_hc') | float / 1000) | round(0) }} kWh
                  · HP: {{ (states('sensor.teleinfo_index_tarif_2_hp') | float / 1000) | round(0) }} kWh
                icon: >-
                  {% if is_state('binary_sensor.heure_creuse', 'on') %}
                    mdi:lightning-bolt-outline
                  {% else %}
                    mdi:lightning-bolt
                  {% endif %}
                icon_color: >-
                  {% if is_state('binary_sensor.heure_creuse', 'on') %}
                    blue
                  {% else %}
                    orange
                  {% endif %}
                tap_action:
                  action: more-info
                card_mod:
                  style: |
                    ha-card {
                      border: none !important;
                      box-shadow: none !important;
                      --spacing: 6px;
                    }
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                entity: cover.awning_0001
                primary: Store
                secondary: >-
                  {% if is_state('cover.awning_0001', 'open') %}Ouvert{% else
                  %}Fermé{% endif %}
                icon: >-
                  {% if is_state('cover.awning_0001', 'open')
                  %}mdi:storefront-outline{% else %}mdi:storefront{% endif %}
                icon_color: >-
                  {% if is_state('cover.awning_0001', 'open') %}orange{% else
                  %}grey{% endif %}
                tap_action:
                  action: toggle
                hold_action:
                  action: more-info
              - type: custom:mushroom-template-card
                entity: light.wled_outside
                primary: WLED
                secondary: >-
                  {% if is_state('light.wled_outside', 'on') %}ON{% else %}OFF{%
                  endif %}
                icon: mdi:led-strip-variant
                icon_color: >-
                  {% if is_state('light.wled_outside', 'on') %}yellow{% else
                  %}grey{% endif %}
                tap_action:
                  action: toggle
                hold_action:
                  action: more-info
              - type: custom:mushroom-template-card
                entity: valve.valve_controller_valve
                primary: Arrosage
                secondary: >-
                  {% if is_state('valve.valve_controller_valve', 'open') %}Ouvert{% else %}Fermé{% endif %}
                icon: >-
                  {% if is_state('valve.valve_controller_valve', 'open') %}mdi:water{% else %}mdi:water-off{% endif %}
                icon_color: >-
                  {% if is_state('valve.valve_controller_valve', 'open') %}blue{% else %}grey{% endif %}
                tap_action:
                  action: toggle
                hold_action:
                  action: more-info
          - type: custom:webrtc-camera
            title: Sonette
            url: camera.reolink_doorbell_sub
            media: video, audio
      - type: vertical-stack
        cards:
          - type: custom:mushroom-chips-card
            alignment: center
            chips:
              - type: template
                entity: sensor.teleinfo_libelle_tarif_en_cours
                icon: >-
                  {% if is_state('binary_sensor.heure_creuse', 'on') %}
                    mdi:lightning-bolt-outline
                  {% else %}
                    mdi:lightning-bolt
                  {% endif %}
                icon_color: >-
                  {% if is_state('binary_sensor.heure_creuse', 'on') %}
                    blue
                  {% else %}
                    orange
                  {% endif %}
                content: >-
                  {% if is_state('binary_sensor.heure_creuse', 'on') %}HC{% else %}HP{% endif %}
                tap_action:
                  action: more-info
              - type: template
                entity: sensor.teleinfo_puissance_apparente
                icon: mdi:transmission-tower
                icon_color: blue
                content: >-
                  TIC {{ states('sensor.teleinfo_puissance_apparente') | float(0) | round(0) }} VA
                tap_action:
                  action: more-info
              - type: template
                entity: sensor.msunpv_powreso
                icon: mdi:solar-power
                icon_color: yellow
                content: >-
                  PV {{ states('sensor.msunpv_powreso') | float(0) | round(0) }} W
                tap_action:
                  action: more-info
            card_mod:
              style: |
                ha-card {
                  margin-bottom: 4px;
                }
          - type: custom:stack-in-card
            mode: vertical
            cards:
              - type: custom:mini-graph-card
                name: Salon
                height: 50
                decimals: 1
                line_width: 2
                entities:
                  - entity: sensor.atc_0d03_temperature
                    name: Temp.
                    color: '#e45e33'
                  - entity: sensor.atc_0d03_humidity
                    name: Hyg.
                    color: '#1e5eee'
                    y_axis: secondary
                    show_state: true
                card_mod:
                  style: |
                    ha-card {
                      border: none !important;
                      box-shadow: none !important;
                    }
                    .states.flex::after {
                      content: "{{ relative_time(states['sensor.atc_0d03_temperature'].last_changed) }}";
                      white-space: pre;
                      font-size: 0.8em;
                      opacity: 0.7;
                    }
                    .flex {
                      padding: 5px;
                    }
              - type: horizontal-stack
                cards:
                  - type: custom:stack-in-card
                    mode: vertical
                    card_mod:
                      style: |
                        ha-card {
                          border: none !important;
                          box-shadow: none !important;
                        }
                    cards:
                      - type: custom:mushroom-climate-card
                        entity: climate.mitsusalon_mitsusalon
                        name: Salon
                        show_temperature_control: true
                        hvac_modes:
                          - 'off'
                          - heat
                          - dry
                          - cool
                          - fan_only
                        tap_action:
                          action: more-info
                        card_mod:
                          style: |
                            ha-card {
                              border: none !important;
                              box-shadow: none !important;
                            }
                      - type: custom:mushroom-chips-card
                        alignment: center
                        chips:
                          - type: template
                            entity: sensor.input_power
                            icon: mdi:lightning-bolt
                            icon_color: >-
                              {% if states('sensor.input_power') | float(0) > 1
                              %}
                                orange
                              {% else %}
                                grey
                              {% endif %}
                            content: >-
                              {{ states('sensor.input_power') | float(0) |
                              round(0) }} W
                            tap_action:
                              action: more-info
                        card_mod:
                          style: |
                            ha-card {
                              --chip-spacing: 0;
                              padding: 0 8px 4px 8px !important;
                            }
                  - type: custom:stack-in-card
                    mode: vertical
                    card_mod:
                      style: |
