title: Proxmox
views:
  - path: proxmox
    title: Proxmox
    icon: mdi:server
    cards:
      - type: vertical-stack
        cards:
          - type: custom:stack-in-card
            mode: vertical
            cards:
              - type: custom:mushroom-title-card
                title: Node — prox
                subtitle: >-
                  Up since {{ as_timestamp(states('sensor.node_prox_last_boot'))
                  | timestamp_custom('%d/%m %H:%M') }} ({{
                  relative_time(states('sensor.node_prox_last_boot') |
                  as_datetime) }})
              - type: custom:mushroom-chips-card
                alignment: center
                chips:
                  - type: template
                    entity: binary_sensor.node_prox_status
                    icon: mdi:server-network
                    icon_color: >-
                      {% if is_state('binary_sensor.node_prox_status', 'on')
                      %}green {% else %}red{% endif %}
                    content: >-
                      {% if is_state('binary_sensor.node_prox_status', 'on')
                      %}Online {% else %}Offline{% endif %}
                    tap_action:
                      action: more-info
                  - type: template
                    entity: sensor.node_prox_virtual_machines_running
                    icon: mdi:server
                    icon_color: cyan
                    content: >-
                      {{ states('sensor.node_prox_virtual_machines_running') }}
                      VMs
                    tap_action:
                      action: more-info
                  - type: template
                    entity: sensor.node_prox_total_updates
                    icon: mdi:update
                    icon_color: >-
                      {% if states('sensor.node_prox_total_updates') | int(0) >
                      0 %}orange {% else %}green{% endif %}
                    content: >-
                      {% set n = states('sensor.node_prox_total_updates') |
                      int(0) %} {% if n > 0 %}{{ n }} update{{ 's' if n > 1 }}
                      {% else %}Up to date{% endif %}
                    tap_action:
                      action: more-info
                card_mod:
                  style: |
                    ha-card {
                      --chip-spacing: 4px;
                      padding: 0 8px 8px 8px !important;
                    }
          - type: horizontal-stack
            cards:
              - type: custom:mini-graph-card
                name: CPU
                icon: mdi:cpu-64-bit
                height: 100
                line_width: 2
                hours_to_show: 24
                points_per_hour: 4
                entities:
                  - entity: sensor.node_prox_cpu_used
                    name: CPU %
                color_thresholds:
                  - value: 0
                    color: '#3aaa00'
                  - value: 50
                    color: '#f5b514'
                  - value: 80
                    color: '#d75024'
                show:
                  fill: true
                  labels: true
              - type: custom:mini-graph-card
                name: RAM
                icon: mdi:memory
                height: 100
                line_width: 2
                hours_to_show: 24
                points_per_hour: 4
                entities:
                  - entity: sensor.node_prox_memory_used_percentage
                    name: RAM %
                color_thresholds:
                  - value: 0
                    color: '#3aaa00'
                  - value: 60
                    color: '#f5b514'
                  - value: 85
                    color: '#d75024'
                show:
                  fill: true
                  labels: true
          - type: custom:stack-in-card
            mode: vertical
            cards:
              - type: custom:mushroom-template-card
                icon: mdi:memory
                icon_color: purple
                primary: >-
                  RAM {{ states('sensor.node_prox_memory_used') | float |
                  round(2) }} / {{ (states('sensor.node_prox_memory_used') |
                  float + states('sensor.node_prox_memory_free') | float) |
                  round(2) }} GB
                secondary: >-
                  {{ states('sensor.node_prox_memory_used_percentage') | float |
                  round(1) }}% used • {{ states('sensor.node_prox_memory_free')
                  | float | round(2) }} GB free
                tap_action:
                  action: more-info
                  entity: sensor.node_prox_memory_used_percentage
                card_mod:
                  style: >
                    ha-card { border: none !important; box-shadow: none
                    !important; }
              - type: custom:mushroom-template-card
                icon: mdi:harddisk
                icon_color: blue
                primary: >-
                  Boot disk {{ states('sensor.node_prox_disk_used') | float |
                  round(2) }} / {{ states('sensor.node_prox_disk_total') | float
                  | round(2) }} GB
                secondary: >-
                  {{ states('sensor.node_prox_disk_used_percentage') | float |
                  round(1) }}% used • {{ states('sensor.node_prox_disk_free') |
                  float | round(2) }} GB free
                tap_action:
                  action: more-info
                  entity: sensor.node_prox_disk_used_percentage
                card_mod:
                  style: >
                    ha-card { border: none !important; box-shadow: none
                    !important; }
          - type: custom:stack-in-card
            mode: vertical
            cards:
              - type: custom:mushroom-title-card
                title: Storage Pools
              - type: horizontal-stack
                cards:
                  - type: gauge
                    entity: sensor.storage_prox_local_disk_used_percentage
                    name: local
                    min: 0
                    max: 100
                    needle: true
                    severity:
                      green: 0
                      yellow: 70
                      red: 90
                  - type: gauge
                    entity: sensor.storage_prox_local_lvm_disk_used_percentage
                    name: local-lvm
                    min: 0
                    max: 100
                    needle: true
                    severity:
                      green: 0
                      yellow: 70
                      red: 90
          - type: custom:stack-in-card
            mode: vertical
            cards:
              - type: custom:mushroom-title-card
                title: Physical Disks
              - type: custom:mushroom-chips-card
                alignment: center
                chips:
                  - type: template
                    entity: binary_sensor.disk_prox_flash_disk_health
                    icon: mdi:usb-flash-drive
                    icon_color: >-
                      {% if
                      is_state('binary_sensor.disk_prox_flash_disk_health',
                      'off') %}green {% else %}red{% endif %}
                    content: >-
                      Flash {{ states('sensor.disk_prox_flash_disk_size') |
                      float | round(0) }}GB {% if
                      is_state('binary_sensor.disk_prox_flash_disk_health',
                      'on') %}⚠{% endif %}
                    tap_action:
                      action: more-info
                  - type: template
                    entity: binary_sensor.disk_prox_intel_ssdsc2cw120a3_health
                    icon: mdi:harddisk
                    icon_color: >-
                      {% if
                      is_state('binary_sensor.disk_prox_intel_ssdsc2cw120a3_health',
                      'off') %}green {% else %}red{% endif %}
                    content: Intel 120GB
                    tap_action:
                      action: more-info
                  - type: template
                    entity: binary_sensor.disk_prox_sandisk_ultra_ii_240gb_health
                    icon: mdi:harddisk
                    icon_color: >-
                      {% if
                      is_state('binary_sensor.disk_prox_sandisk_ultra_ii_240gb_health',
                      'off') %}green {% else %}red{% endif %}
                    content: SanDisk 240GB
                    tap_action:
                      action: more-info
                card_mod:
                  style: >
                    ha-card { --chip-spacing: 4px; border: none !important;
                    box-shadow: none !important; }
              - type: custom:mushroom-chips-card
                alignment: center
                chips:
                  - type: template
                    entity: binary_sensor.disk_prox_wdc_wd20efrx_68ax9n0_health
                    icon: mdi:harddisk
                    icon_color: >-
                      {% if
                      is_state('binary_sensor.disk_prox_wdc_wd20efrx_68ax9n0_health',
                      'off') %}green {% else %}red{% endif %}
                    content: 'WD Red 2TB #1'
                    tap_action:
                      action: more-info
                  - type: template
                    entity: binary_sensor.disk_prox_wdc_wd20efrx_68ax9n0_health_2
                    icon: mdi:harddisk
                    icon_color: >-
                      {% if
                      is_state('binary_sensor.disk_prox_wdc_wd20efrx_68ax9n0_health_2',
                      'off') %}green {% else %}red{% endif %}
                    content: 'WD Red 2TB #2'
                    tap_action:
                      action: more-info
                  - type: template
                    entity: binary_sensor.disk_prox_wdc_wd40efzx_68awun0_health
                    icon: mdi:harddisk
                    icon_color: >-
                      {% if
                      is_state('binary_sensor.disk_prox_wdc_wd40efzx_68awun0_health',
                      'off') %}green {% else %}red{% endif %}
                    content: WD Red 4TB
                    tap_action:
                      action: more-info
                card_mod:
                  style: >
                    ha-card { --chip-spacing: 4px; border: none !important;
                    box-shadow: none !important; }
              - type: custom:mini-graph-card
                name: Disk Temperatures
                icon: mdi:thermometer
                height: 60
                line_width: 2
                hours_to_show: 24
                points_per_hour: 2
                show:
                  labels: true
                  legend: true
                entities:
                  - entity: sensor.disk_prox_sandisk_ultra_ii_240gb_temperature
                    name: SanDisk
                    color: '#0867ec'
                  - entity: sensor.disk_prox_wdc_wd20efrx_68ax9n0_temperature
                    name: WD 2TB
                    color: '#f5b514'
                  - entity: sensor.disk_prox_wdc_wd20efrx_68ax9n0_temperature_2
                    name: WD 2TB
                    color: '#e45e33'
                  - entity: sensor.disk_prox_wdc_wd40efzx_68awun0_temperature
                    name: WD 4TB
                    color: '#3aaa00'
                card_mod:
                  style: >
                    ha-card { border: none !important; box-shadow: none
                    !important; }
              - type: custom:mushroom-chips-card
                alignment: center
                chips:
                  - type: template
                    entity: sensor.disk_prox_intel_ssdsc2cw120a3_wearout
                    icon: mdi:clipboard-pulse-outline
                    icon_color: >-
                      {% set w =
                      states('sensor.disk_prox_intel_ssdsc2cw120a3_wearout') |
                      float(0) %} {% if w < 50 %}green{% elif w < 80 %}orange{%
                      else %}red{% endif %}
                    content: >-
                      Intel wear {{
                      states('sensor.disk_prox_intel_ssdsc2cw120a3_wearout') }}%
                    tap_action:
                      action: more-info
                  - type: template
                    entity: sensor.disk_prox_sandisk_ultra_ii_240gb_wearout
                    icon: mdi:clipboard-pulse-outline
                    icon_color: >-
                      {% set w =
                      states('sensor.disk_prox_sandisk_ultra_ii_240gb_wearout')
