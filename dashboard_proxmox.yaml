                    ha-card { --chip-spacing: 4px; padding: 0 8px 4px 8px
                    !important; border: none !important; box-shadow: none
                    !important; }
              - type: horizontal-stack
                cards:
                  - type: custom:mini-graph-card
                    name: CPU
                    icon: mdi:cpu-64-bit
                    height: 70
                    line_width: 2
                    hours_to_show: 24
                    points_per_hour: 4
                    entities:
                      - entity: sensor.qemu_dd_storage_102_cpu_used
                        name: CPU %
                    color_thresholds:
                      - value: 0
                        color: '#3aaa00'
                      - value: 50
                        color: '#f5b514'
                      - value: 80
                        color: '#d75024'
                    show:
                      fill: true
                    card_mod:
                      style: >
                        ha-card { border: none !important; box-shadow: none
                        !important; }
                  - type: custom:mini-graph-card
                    name: RAM
                    icon: mdi:memory
                    height: 70
                    line_width: 2
                    hours_to_show: 24
                    points_per_hour: 4
                    entities:
                      - entity: sensor.qemu_dd_storage_102_memory_used_percentage
                        name: RAM %
                    color_thresholds:
                      - value: 0
                        color: '#3aaa00'
                      - value: 60
                        color: '#f5b514'
                      - value: 85
                        color: '#d75024'
                    show:
                      fill: true
                    card_mod:
                      style: >
                        ha-card { border: none !important; box-shadow: none
                        !important; }
              - type: custom:mushroom-chips-card
                alignment: center
                chips:
                  - type: template
                    entity: sensor.dd_storage_disk_root_pct
                    icon: mdi:folder
                    icon_color: >-
                      {% set p = states('sensor.dd_storage_disk_root_pct') | float(0) %}
                      {% if p >= 85 %}red{% elif p >= 60 %}orange{% else %}green{% endif %}
                    content: >-
                      / {{ states('sensor.dd_storage_disk_root_used') }}/{{ states('sensor.dd_storage_disk_root_total') }} GB
                    tap_action:
                      action: more-info
                  - type: template
                    entity: sensor.dd_storage_disk_volume1_pct
                    icon: mdi:database
                    icon_color: >-
                      {% set p = states('sensor.dd_storage_disk_volume1_pct') | float(0) %}
                      {% if p >= 85 %}red{% elif p >= 60 %}orange{% else %}green{% endif %}
                    content: >-
                      vol1 {{ states('sensor.dd_storage_disk_volume1_used') }}/{{ states('sensor.dd_storage_disk_volume1_total') }} TB
                    tap_action:
                      action: more-info
                  - type: template
                    entity: sensor.qemu_dd_storage_102_network_in
                    icon: mdi:swap-vertical
                    icon_color: cyan
                    content: >-
                      ↓{{ states('sensor.qemu_dd_storage_102_network_in') | float | round(0) }}
                      ↑{{ states('sensor.qemu_dd_storage_102_network_out') | float | round(0) }} MB
                    tap_action:
                      action: more-info
          - type: custom:stack-in-card
            mode: vertical
            cards:
              - type: custom:mushroom-title-card
                title: VMs Overview
