<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" font-family="'JetBrains Mono','Fira Code',monospace">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#64748b" stroke-width="1.2"/>
    </marker>
    <marker id="arr-cyan" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#22d3ee" stroke-width="1.2"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#f97316" stroke-width="1.2"/>
    </marker>
    <linearGradient id="ha-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f1f33"/>
    </linearGradient>
    <linearGradient id="esp-gr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2744"/>
      <stop offset="100%" stop-color="#0d1525"/>
    </linearGradient>
  </defs>

  <rect width="900" height="320" rx="12" fill="#0a0e17"/>
  <text x="450" y="30" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="bold">Architecture — Pipeline vocal</text>

  <!-- Home Assistant box -->
  <rect x="40" y="70" width="220" height="210" rx="10" fill="url(#ha-grad)" stroke="#3b82f6" stroke-width="2"/>
  <text x="150" y="98" text-anchor="middle" fill="#60a5fa" font-size="15" font-weight="bold">Home Assistant</text>
  <line x1="60" y1="108" x2="240" y2="108" stroke="#1e3a5f" stroke-width="1"/>

  <!-- HA sub-components -->
  <rect x="60" y="120" width="180" height="32" rx="5" fill="#0f1f33" stroke="#475569" stroke-width="1"/>
  <text x="150" y="141" text-anchor="middle" fill="#94a3b8" font-size="11">Whisper (STT)</text>

  <rect x="60" y="162" width="180" height="32" rx="5" fill="#0f1f33" stroke="#475569" stroke-width="1"/>
  <text x="150" y="183" text-anchor="middle" fill="#94a3b8" font-size="11">Conversation / Intents</text>

  <rect x="60" y="204" width="180" height="32" rx="5" fill="#0f1f33" stroke="#475569" stroke-width="1"/>
  <text x="150" y="225" text-anchor="middle" fill="#94a3b8" font-size="11">Piper (TTS)</text>

  <!-- Arrows between HA components -->
  <line x1="150" y1="152" x2="150" y2="162" stroke="#475569" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="150" y1="194" x2="150" y2="204" stroke="#475569" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ESP32-S3 Satellite box -->
  <rect x="440" y="70" width="420" height="210" rx="10" fill="url(#esp-gr)" stroke="#22d3ee" stroke-width="2"/>
  <text x="650" y="98" text-anchor="middle" fill="#22d3ee" font-size="15" font-weight="bold">ESP32-S3 Satellite</text>
  <line x1="460" y1="108" x2="840" y2="108" stroke="#1a2744" stroke-width="1"/>

  <!-- ESP sub-components -->
  <rect x="460" y="120" width="130" height="32" rx="5" fill="#0d1525" stroke="#22d3ee" stroke-width="1"/>
  <text x="525" y="141" text-anchor="middle" fill="#67e8f9" font-size="11">Micro Wake Word</text>

  <rect x="460" y="165" width="130" height="32" rx="5" fill="#0d1525" stroke="#f97316" stroke-width="1"/>
  <text x="525" y="186" text-anchor="middle" fill="#fdba74" font-size="11">Voice Assistant</text>

  <rect x="460" y="210" width="130" height="50" rx="5" fill="#0d1525" stroke="#475569" stroke-width="1"/>
  <text x="525" y="233" text-anchor="middle" fill="#94a3b8" font-size="10">INMP441</text>
  <text x="525" y="248" text-anchor="middle" fill="#94a3b8" font-size="10">MAX98357A</text>

  <!-- Display + LEDs -->
  <rect x="620" y="120" width="110" height="50" rx="5" fill="#0d1525" stroke="#a78bfa" stroke-width="1"/>
  <text x="675" y="143" text-anchor="middle" fill="#c4b5fd" font-size="11">GC9A01A</text>
  <text x="675" y="158" text-anchor="middle" fill="#7c3aed" font-size="9">Ecran 240x240</text>

  <rect x="750" y="120" width="90" height="50" rx="5" fill="#0d1525" stroke="#4ade80" stroke-width="1"/>
  <text x="795" y="143" text-anchor="middle" fill="#86efac" font-size="11">WS2812B</text>
  <text x="795" y="158" text-anchor="middle" fill="#16a34a" font-size="9">12 LEDs</text>

  <!-- Haut-parleur -->
  <rect x="620" y="185" width="220" height="32" rx="5" fill="#0d1525" stroke="#f97316" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="730" y="206" text-anchor="middle" fill="#fb923c" font-size="11">Haut-parleur 40mm</text>

  <!-- okay_nabu label -->
  <rect x="620" y="230" width="220" height="30" rx="5" fill="#0d1525" stroke="#475569" stroke-width="1"/>
  <text x="730" y="249" text-anchor="middle" fill="#475569" font-size="10">"okay nabu" → local sur PSRAM</text>

  <!-- Arrows between ESP components -->
  <line x1="525" y1="152" x2="525" y2="165" stroke="#22d3ee" stroke-width="1" marker-end="url(#arr-cyan)"/>
  <line x1="525" y1="197" x2="525" y2="210" stroke="#475569" stroke-width="1" marker-end="url(#arr)"/>

  <!-- WiFi connection -->
  <g>
    <!-- Audio stream to HA -->
    <path d="M260,136 L440,136" fill="none" stroke="#22d3ee" stroke-width="2" marker-end="url(#arr-cyan)"/>
    <text x="350" y="130" text-anchor="middle" fill="#22d3ee" font-size="9">Audio (I2S)</text>

    <!-- TTS response back -->
    <path d="M440,220 L260,220" fill="none" stroke="#f97316" stroke-width="2" marker-end="url(#arr-orange)"/>
    <text x="350" y="240" text-anchor="middle" fill="#f97316" font-size="9">Reponse TTS</text>

    <!-- WiFi label -->
    <rect x="320" y="165" width="60" height="20" rx="4" fill="#0a0e17" stroke="#475569" stroke-width="1"/>
    <text x="350" y="179" text-anchor="middle" fill="#94a3b8" font-size="9">WiFi</text>
  </g>
</svg>
