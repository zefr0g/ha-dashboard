<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'JetBrains Mono','Fira Code',monospace">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#64748b" stroke-width="1"/>
    </marker>
    <linearGradient id="esp-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f1f33"/>
    </linearGradient>
    <linearGradient id="mod-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" rx="12" fill="#0a0e17"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="bold">Schema de cablage — ESP32-S3 Voice Satellite</text>

  <!-- ESP32-S3 Central Board -->
  <rect x="330" y="160" width="240" height="320" rx="8" fill="url(#esp-grad)" stroke="#3b82f6" stroke-width="2"/>
  <rect x="420" y="470" width="40" height="16" rx="3" fill="#334155" stroke="#64748b" stroke-width="1"/>
  <text x="440" y="483" text-anchor="middle" fill="#94a3b8" font-size="7">USB-C</text>
  <text x="450" y="185" text-anchor="middle" fill="#60a5fa" font-size="14" font-weight="bold">ESP32-S3</text>
  <text x="450" y="200" text-anchor="middle" fill="#475569" font-size="10">DevKitC-1 (PSRAM octale)</text>

  <!-- GPIO Pin labels on ESP32 - Left side -->
  <g fill="#94a3b8" font-size="10" text-anchor="end">
    <text x="345" y="235">GPIO1</text>
    <text x="345" y="260">GPIO2</text>
    <text x="345" y="285">GPIO4</text>
    <text x="345" y="330">GPIO5</text>
    <text x="345" y="355">GPIO6</text>
    <text x="345" y="380">GPIO7</text>
    <text x="345" y="405">GPIO8</text>
  </g>
  <!-- Pin dots left -->
  <g fill="#3b82f6">
    <circle cx="335" cy="232" r="3"/>
    <circle cx="335" cy="257" r="3"/>
    <circle cx="335" cy="282" r="3"/>
    <circle cx="335" cy="327" r="3"/>
    <circle cx="335" cy="352" r="3"/>
    <circle cx="335" cy="377" r="3"/>
    <circle cx="335" cy="402" r="3"/>
  </g>

  <!-- GPIO Pin labels on ESP32 - Right side -->
  <g fill="#94a3b8" font-size="10" text-anchor="start">
    <text x="556" y="235">GPIO10</text>
    <text x="556" y="260">GPIO11</text>
    <text x="556" y="285">GPIO12</text>
    <text x="556" y="310">GPIO13</text>
    <text x="556" y="335">GPIO14</text>
    <text x="556" y="380">GPIO15</text>
  </g>
  <!-- Pin dots right -->
  <g fill="#3b82f6">
    <circle cx="565" cy="232" r="3"/>
    <circle cx="565" cy="257" r="3"/>
    <circle cx="565" cy="282" r="3"/>
    <circle cx="565" cy="307" r="3"/>
    <circle cx="565" cy="332" r="3"/>
    <circle cx="565" cy="377" r="3"/>
  </g>

  <!-- INMP441 Module -->
  <rect x="40" y="210" width="180" height="100" rx="6" fill="url(#mod-grad)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="130" y="236" text-anchor="middle" fill="#22d3ee" font-size="13" font-weight="bold">INMP441</text>
  <text x="130" y="252" text-anchor="middle" fill="#475569" font-size="9">Microphone MEMS I2S</text>
  <g fill="#67e8f9" font-size="9" text-anchor="end">
    <text x="215" y="272">BCLK</text>
    <text x="215" y="287">LRCLK</text>
    <text x="215" y="302">DOUT</text>
  </g>

  <!-- Wires: INMP441 → ESP32 -->
  <g stroke="#22d3ee" stroke-width="1.5" fill="none" opacity="0.8">
    <line x1="220" y1="269" x2="332" y2="232"/>
    <line x1="220" y1="284" x2="332" y2="257"/>
    <line x1="220" y1="299" x2="332" y2="282"/>
  </g>

  <!-- MAX98357A Module -->
  <rect x="40" y="340" width="180" height="100" rx="6" fill="url(#mod-grad)" stroke="#f97316" stroke-width="1.5"/>
  <text x="130" y="366" text-anchor="middle" fill="#f97316" font-size="13" font-weight="bold">MAX98357A</text>
  <text x="130" y="382" text-anchor="middle" fill="#475569" font-size="9">Ampli Class-D I2S 3W</text>
  <g fill="#fdba74" font-size="9" text-anchor="end">
    <text x="215" y="402">BCLK</text>
    <text x="215" y="417">LRCLK</text>
    <text x="215" y="432">DIN</text>
  </g>

  <!-- Wires: MAX98357A → ESP32 -->
  <g stroke="#f97316" stroke-width="1.5" fill="none" opacity="0.8">
    <line x1="220" y1="399" x2="332" y2="327"/>
    <line x1="220" y1="414" x2="332" y2="352"/>
    <line x1="220" y1="429" x2="332" y2="377"/>
  </g>
  <!-- SD pin -->
  <line x1="260" y1="432" x2="332" y2="402" stroke="#f97316" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <text x="260" y="445" fill="#fdba74" font-size="8" text-anchor="end">SD (enable)</text>

  <!-- Speaker -->
  <rect x="40" y="470" width="180" height="60" rx="6" fill="url(#mod-grad)" stroke="#f97316" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="130" y="497" text-anchor="middle" fill="#fb923c" font-size="12">Haut-parleur 40mm</text>
  <text x="130" y="515" text-anchor="middle" fill="#475569" font-size="9">Full-range</text>
  <line x1="130" y1="440" x2="130" y2="470" stroke="#f97316" stroke-width="1.5" opacity="0.5"/>

  <!-- GC9A01A Display -->
  <rect x="680" y="190" width="180" height="130" rx="6" fill="url(#mod-grad)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="770" y="218" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="bold">GC9A01A</text>
  <text x="770" y="234" text-anchor="middle" fill="#475569" font-size="9">Ecran rond 1.28" SPI</text>
  <text x="770" y="248" text-anchor="middle" fill="#475569" font-size="9">240x240 IPS</text>
  <g fill="#c4b5fd" font-size="9" text-anchor="start">
    <text x="685" y="270">CS</text>
    <text x="685" y="285">MOSI</text>
    <text x="685" y="300">CLK</text>
    <text x="685" y="315">DC</text>
  </g>

  <!-- Wires: GC9A01A → ESP32 -->
  <g stroke="#a78bfa" stroke-width="1.5" fill="none" opacity="0.8">
    <line x1="680" y1="267" x2="568" y2="232"/>
    <line x1="680" y1="282" x2="568" y2="257"/>
    <line x1="680" y1="297" x2="568" y2="282"/>
    <line x1="680" y1="312" x2="568" y2="307"/>
  </g>
  <!-- RST -->
  <line x1="680" y1="312" x2="568" y2="332" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="685" y="328" fill="#c4b5fd" font-size="8">RST</text>

  <!-- WS2812B Ring -->
  <rect x="680" y="360" width="180" height="90" rx="6" fill="url(#mod-grad)" stroke="#4ade80" stroke-width="1.5"/>
  <text x="770" y="388" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="bold">WS2812B</text>
  <text x="770" y="404" text-anchor="middle" fill="#475569" font-size="9">Anneau 12 LEDs</text>
  <text x="685" y="430" fill="#86efac" font-size="9">DIN</text>

  <!-- Wire: WS2812B → ESP32 -->
  <line x1="680" y1="427" x2="568" y2="377" stroke="#4ade80" stroke-width="1.5" opacity="0.8"/>

  <!-- Power rails -->
  <rect x="330" y="540" width="240" height="50" rx="6" fill="none" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="450" y="560" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="bold">Alimentation</text>
  <text x="450" y="578" text-anchor="middle" fill="#94a3b8" font-size="9">3V3 → micro, ecran, LEDs   |   5V → ampli   |   GND → tous</text>

  <!-- I2S bus labels -->
  <rect x="240" y="213" width="60" height="16" rx="3" fill="#164e63" opacity="0.7"/>
  <text x="270" y="224" text-anchor="middle" fill="#22d3ee" font-size="8" font-weight="bold">I2S mic</text>

  <rect x="240" y="345" width="60" height="16" rx="3" fill="#431407" opacity="0.7"/>
  <text x="270" y="356" text-anchor="middle" fill="#f97316" font-size="8" font-weight="bold">I2S spk</text>

  <rect x="600" y="238" width="55" height="16" rx="3" fill="#2e1065" opacity="0.7"/>
  <text x="627" y="249" text-anchor="middle" fill="#a78bfa" font-size="8" font-weight="bold">SPI</text>

  <!-- Legend -->
  <g transform="translate(40, 55)">
    <text x="0" y="0" fill="#64748b" font-size="10" font-weight="bold">LEGENDE</text>
    <line x1="0" y1="18" x2="25" y2="18" stroke="#22d3ee" stroke-width="2"/>
    <text x="30" y="22" fill="#94a3b8" font-size="9">I2S Microphone</text>
    <line x1="150" y1="18" x2="175" y2="18" stroke="#f97316" stroke-width="2"/>
    <text x="180" y="22" fill="#94a3b8" font-size="9">I2S Amplificateur</text>
    <line x1="330" y1="18" x2="355" y2="18" stroke="#a78bfa" stroke-width="2"/>
    <text x="360" y="22" fill="#94a3b8" font-size="9">SPI Ecran</text>
    <line x1="460" y1="18" x2="485" y2="18" stroke="#4ade80" stroke-width="2"/>
    <text x="490" y="22" fill="#94a3b8" font-size="9">Data LEDs</text>
    <line x1="580" y1="18" x2="605" y2="18" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="610" y="22" fill="#94a3b8" font-size="9">Alimentation</text>
  </g>
</svg>
