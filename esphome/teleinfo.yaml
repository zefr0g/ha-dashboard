  - platform: teleinfo
    teleinfo_id: tic
    tag_name: "PREF"
    name: "Puissance de référence"
    unit_of_measurement: "kVA"
    entity_category: diagnostic

  - platform: teleinfo
    teleinfo_id: tic
    tag_name: "PCOUP"
