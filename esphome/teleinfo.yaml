text_sensor:
  - platform: teleinfo
    teleinfo_id: tic
    tag_name: "ADSC"
    name: "Numéro compteur"
    entity_category: diagnostic

  - platform: teleinfo
    teleinfo_id: tic
    tag_name: "NGTF"
    name: "Option tarifaire"
    entity_category: diagnostic

  - platform: teleinfo
    teleinfo_id: tic
    tag_name: "LTARF"
    name: "Libellé tarif en cours"
    filters:
      - lambda: |-
          // Trim and collapse multiple spaces
          std::string s = x;
          // trim leading
          s.erase(0, s.find_first_not_of(' '));
          // trim trailing
          s.erase(s.find_last_not_of(' ') + 1);
          // collapse double spaces
          std::string result;
          bool prev_space = false;
          for (char c : s) {
            if (c == ' ') {
              if (!prev_space) result += c;
              prev_space = true;
            } else {
              result += c;
              prev_space = false;
            }
          }
          return result;

  - platform: teleinfo
    teleinfo_id: tic
    tag_name: "NTARF"
    name: "Numéro index tarif"

# WS2812 RGB LED — GPIO14 = D5 on D1 Mini
light:
  - platform: neopixelbus
    type: GRB
    variant: WS2812
    pin: GPIO14
    num_leds: 1
    name: "TIC LED"
    id: status_led

# I2C — GPIO4=SDA(D2), GPIO5=SCL(D1) — uncomment if you add a display/sensor
# i2c:
#   sda: GPIO4
#   scl: GPIO5
