substitutions:
  name: teleinfo

packages:
  core: !include common/core.yaml
  wifi: !include common/wifi.yaml

esphome:
  name: ${name}

esp8266:
  board: d1_mini

# Disable serial logger — GPIO13 (teleinfo RX) conflicts with UART0 used by logger
logger:
  baud_rate: 0
  logs:
    teleinfo: DEBUG

# Teleinfo (TIC) UART — GPIO13 = D7 on D1 Mini (alternate RX for UART0)
# Standard (Linky) mode: 9600 baud, 7E1
uart:
  id: uart_teleinfo
  rx_pin: GPIO13
  baud_rate: 9600
  parity: EVEN
  stop_bits: 1
  data_bits: 7
  rx_buffer_size: 1024

teleinfo:
  id: tic
  uart_id: uart_teleinfo
  historical_mode: false
  update_interval: 2s

sensor:
  - platform: teleinfo
    teleinfo_id: tic
    tag_name: "SINSTS"
    name: "Puissance apparente"
    unit_of_measurement: "VA"
    device_class: apparent_power
    state_class: measurement
    filters:
      - lambda: |-
          // Abonnement 9 kVA — rejeter tout ce qui dépasse 10 kVA
          if (x < 0 || x > 10000) return {};
          return x;

  - platform: teleinfo
    teleinfo_id: tic
    tag_name: "IRMS1"
    name: "Intensité phase 1"
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    filters:
      - lambda: |-
          // 9 kVA / 230 V ≈ 39 A max — rejeter au-delà de 50 A
          if (x < 0 || x > 50) return {};
          return x;

  - platform: teleinfo
    teleinfo_id: tic
    tag_name: "URMS1"
    name: "Tension phase 1"
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    filters:
      - lambda: |-
          // Réseau français 230 V ±15 % — rejeter hors plage 180–270 V
          if (x < 180 || x > 270) return {};
          return x;

  - platform: teleinfo
    teleinfo_id: tic
    tag_name: "EAST"
    name: "Énergie active totale"
    unit_of_measurement: "Wh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 0
    filters:
      - lambda: |-
          static float last = -1;
          if (last < 0) {
            // Première lecture : exiger ≥ 100 kWh pour rejeter les 0 au redémarrage
            if (x >= 100000 && x < 300000000) { last = x; return x; }
            return {};
          }
          float delta = x - last;
          // Rejeter les sauts > 500 kWh ou les baisses (compteur croissant)
          if (delta >= 0 && delta <= 500000) { last = x; return x; }
          return {};

  - platform: teleinfo
    teleinfo_id: tic
    tag_name: "EASF01"
    name: "Index tarif 1 (HC)"
    unit_of_measurement: "Wh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 0
    filters:
      - lambda: |-
          static float last = -1;
          if (last < 0) {
            if (x >= 100000 && x < 300000000) { last = x; return x; }
            return {};
          }
          float delta = x - last;
          if (delta >= 0 && delta <= 500000) { last = x; return x; }
          return {};

  - platform: teleinfo
    teleinfo_id: tic
    tag_name: "EASF02"
    name: "Index tarif 2 (HP)"
    unit_of_measurement: "Wh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 0
    filters:
      - lambda: |-
          static float last = -1;
          if (last < 0) {
            if (x >= 100000 && x < 300000000) { last = x; return x; }
            return {};
          }
          float delta = x - last;
          if (delta >= 0 && delta <= 500000) { last = x; return x; }
          return {};

