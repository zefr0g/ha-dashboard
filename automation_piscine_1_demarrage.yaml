alias: "Piscine — Démarrage journalier (lever + 3h)"
description: "Démarre la pompe chaque matin 3h après le lever du soleil."
trigger:
  - platform: sun
    event: sunrise
    offset: "03:00:00"
condition:
  - condition: template
    value_template: >
      {% set temp = states('sensor.temperature_piscine') | float(0) %}
      {{ temp > 10 }}
  - condition: state
    entity_id: switch.piscine_relais
    state: "off"
action:
  - service: switch.turn_on
    target:
      entity_id: switch.piscine_relais
mode: single
